name: CI

on:
  push:
    branches: [main, develop, full-stack-testing]
  pull_request:
    branches: [main, develop]

# Cancel in-flight runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Backend (Node.js / Jest) ─────────────────────────────────────────────

  backend-tests:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          ENGINE_URL: http://localhost:8000
          FRONTEND_URL: http://localhost:3000
        run: npm run test:coverage

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ─── Frontend (Vitest) ────────────────────────────────────────────────────

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          VITE_API_URL: http://localhost:5000/api
        run: npm run test:coverage

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ─── Engine (pytest) ──────────────────────────────────────────────────────

  engine-tests:
    name: Engine Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: engine/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run unit tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: test_db
          REDIS_URL: redis://localhost:6379/0
          OLLAMA_BASE_URL: http://localhost:11434
        run: |
          pytest tests/unit/ tests/security/ \
            --cov=services \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: Upload engine coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-coverage
          path: engine/coverage.xml
          retention-days: 7

  # ─── Summary gate ─────────────────────────────────────────────────────────

  all-tests-pass:
    name: All Tests Pass
    needs: [backend-tests, frontend-tests, engine-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "Backend tests failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "Frontend tests failed"
            exit 1
          fi
          if [[ "${{ needs.engine-tests.result }}" != "success" ]]; then
            echo "Engine tests failed"
            exit 1
          fi
          echo "All test suites passed ✓"
