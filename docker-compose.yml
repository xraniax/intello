version: '3.9'
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    # Dev mode: mount source if you want live editing
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - db
      - engine
    volumes:
      - ./backend:/app
      - /app/node_modules

  engine:
    build: ./engine
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./engine:/app

  db:
    image: postgres:16
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data:
