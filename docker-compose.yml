services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - CHOKIDAR_USEPOLLING=true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
      - .env
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      engine:
        condition: service_started
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: npm run dev

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./engine/.env
      - .env
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
      ollama_gpu:
        condition: service_healthy
    volumes:
      - ./engine:/app
      - ./backend/uploads:/data/uploads
    environment:
      COGNIFY_UPLOADS_DIR: /data/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  celery_worker:
    build:
      context: ./engine
      dockerfile: Dockerfile
    env_file:
      - ./engine/.env
      - .env
    depends_on:
      - redis
      - db
      - ollama_gpu
    volumes:
      - ./engine:/app
      - ./backend/uploads:/data/uploads
    environment:
      COGNIFY_UPLOADS_DIR: /data/uploads
    command: celery -A celery_app worker --concurrency=1 --loglevel=info

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama_gpu:
    image: ollama/ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    runtime: nvidia
    environment:
      - OLLAMA_NUM_GPU=1

  db:
    image: pgvector/pgvector:pg16
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-elearning}" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend_node_modules:
  postgres_data:
  ollama_data:
