services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - CHOKIDAR_USEPOLLING=true
      - OLLAMA_GENERATION_MODEL=llama3.1:8b

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - backend/.env
    depends_on:
      db:
        condition: service_healthy
      engine:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama_init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
      - ./db:/db:ro
      - ./backend/uploads:/app/data/uploads
      - backend_node_modules:/app/node_modules
    environment:
      - DB_MIGRATIONS_DIR=/db/migrations
      - PDF_STORAGE_PATH=/app/data/uploads
    command: ["sh", "scripts/start.sh", "dev"]

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./engine/.env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama_init:
        condition: service_completed_successfully
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - COGNIFY_UPLOADS_DIR=/data/uploads
      - OLLAMA_GENERATION_MODEL=llama3.1:8b
    volumes:
      - ./engine:/app
      - ./backend/uploads:/data/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health', timeout=3); sys.exit(0)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  celery_worker:
    build:
      context: ./engine
      dockerfile: Dockerfile
    env_file:
      - ./engine/.env.docker
    depends_on:
      db:
        condition: service_healthy
      engine:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama_init:
        condition: service_completed_successfully
    volumes:
      - ./engine:/app
      - ./backend/uploads:/app/data/uploads
      - ./engine/services/credentials:/app/credentials:ro
    environment:
      - COGNIFY_UPLOADS_DIR=/app/data/uploads
      - OLLAMA_GENERATION_MODEL=llama3.1:8b
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    command: celery -A celery_app worker --loglevel=info

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: cognify-ollama_gpu-1
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_FLASH_ATTENTION=1
      - OLLAMA_MAX_LOADED_MODELS=1
    ports:
      - "11434:11434"
    gpus: all
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama_init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - ./engine/.env.docker
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
      - ./engine/scripts/ollama-init.sh:/scripts/ollama-init.sh:ro
    entrypoint: ["sh", "/scripts/ollama-init.sh"]
    restart: "no"

  db:
    image: pgvector/pgvector:pg16
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-elearning}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  backend_node_modules:
  postgres_data:
  ollama_data: